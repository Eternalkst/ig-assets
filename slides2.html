<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  body { background:#0d0f14; color:#fff; font-family:'Segoe UI', Arial, sans-serif; }
  .slide { width:1080px; height:1350px; display:flex; position:relative; flex-direction:column; justify-content:center; padding:90px 84px; }
  .kicker { font-size:32px; letter-spacing:5px; text-transform:uppercase; color:#7cf25c; font-weight:700; margin-bottom:40px; }
  h1 { font-size:110px; line-height:1.05; font-weight:900; letter-spacing:-2px; }
  h1 .acc { color:#7cf25c; }
  h1.mid { font-size:96px; }
  .sub { font-size:48px; line-height:1.3; color:#aeb4c0; margin-top:48px; }
  .sub b { color:#fff; }
  .huge { font-size:230px; font-weight:900; color:#7cf25c; line-height:1; letter-spacing:-6px; margin-bottom:28px; }
  .footer { position:absolute; bottom:56px; left:84px; right:84px; display:flex; justify-content:space-between; font-size:30px; color:#5a6070; }
  .cta-box { background:#161a22; border:2px solid #2c4a30; border-radius:28px; padding:52px 56px; margin-top:56px; font-size:50px; line-height:1.35; }
  .cta-box b { color:#7cf25c; }
</style>
<div id="root"></div>
<script>
// Каждый слайд: k=кикер, h=заголовок (html), s=подтекст (html), huge=гигантская цифра, cta=рамка
var CAROUSELS = {

    {huge:"4", h:"Одна аудитория, один креатив", s:"Без тестов это не таргет. Это лотерея."},

  c03: [
    {k:"Кейс из Ads Manager", h:"Заявка за <span class='acc'>$0.37</span>. Ниша, где «реклама не работает»"},

  ],
  c04: [
    {k:"Разбор", h:"«Мы пробовали таргет — <span class='acc'>не работает</span>»"},
    {huge:"1", h:"Реклама вела на профиль", s:"А не на страницу с кнопкой. Минус половина заявок."},
    {huge:"2", h:"Аудитория «весь город 18–65»", s:"Это не таргетинг. Это стрельба в небо."},
    {huge:"3", h:"Остановили через 3 дня", s:"Алгоритм даже не успел обучиться."},
    {huge:"4", h:"Заявкам отвечали через сутки", s:"60% заявок сгорают за первый час тишины."},

  c05: [

    {huge:"×3", h:"дороже заявка с кнопки", s:"Без тестов, без аудиторий, без оптимизации."},

  c06: [

    {k:"Сохрани", h:"Проверь свой сайт по этим 5 блокам", s:"<b>Подпишись</b> — тут шпаргалки, которые экономят бюджет.", cta:true}
  ],
  c07: [
    {k:"Кейс из Ads Manager", h:"<span class='acc'>$311</span> на рекламу → <span class='acc'>467</span> заявок"},

    {k:"Правило", h:"В отчёте нет CPL — вас водят за нос", s:"<b>Подпишись</b> — научу читать отчёты таргетолога.", cta:true}
  ],
  c09: [
    {k:"Честный расклад", h:"Что делать с бюджетом <span class='acc'>50 / 100 / 300</span> тысяч"},
    {huge:"50к", h:"Рекламу не запускать", s:"Сделай нормальную посадочную. Иначе сольёшь."},

    {huge:"300к", h:"Лендинг + месяц рекламы", s:"С тестами и оптимизацией. Тут начинаются стабильные заявки."},
    {k:"Сохрани", h:"Бюджет решает меньше, чем система", s:"<b>Подпишись</b> @prosolenko.valeriy — про заявки без воды.", cta:true}
  ],
  c10: [
    {k:"Автоматизация", h:"90% контента — <span class='acc'>конвейер</span>. Его должен делать робот"},
    {huge:"90ч", h:"в месяц съедает блог руками", s:"Час на пост × 3 поста в день. Посчитай свои."},
    {h:"Мой блог ведёт бот", s:"3 поста в день, сам, из облака. Плачу 0 ₽/мес."},
    {h:"Себе — 15 минут в день", s:"Отвечать людям в комментах. Именно это приносит заявки."},
    {k:"Хочешь так же?", h:"Подпишись + комментарий «БОТ»", s:"Пришлю в директ <b>бесплатный гайд</b>: как включить автопилот.", cta:true}
  ]
};

var hash = (location.hash || '#c01-1').replace('#','').split('-');
var car = CAROUSELS[hash[0]] || CAROUSELS.c01;
var idx = parseInt(hash[1] || '1', 10) - 1;
var s = car[Math.max(0, Math.min(idx, car.length - 1))];
var total = car.length;

var html = '<div class="slide">';
if (s.k) html += '<div class="kicker">' + s.k + '</div>';
if (s.huge) html += '<div class="huge">' + s.huge + '</div>';
if (s.h) html += '<h1 class="' + ((s.h.length > 46) ? 'mid' : '') + '">' + s.h + '</h1>';
if (s.s && !s.cta) html += '<div class="sub">' + s.s + '</div>';
if (s.s && s.cta) html += '<div class="cta-box">' + s.s + '</div>';
html += '<div class="footer"><span>@prosolenko.valeriy</span><span>' + (idx + 1) + ' / ' + total + '</span></div></div>';
document.getElementById('root').innerHTML = html;
</script>
